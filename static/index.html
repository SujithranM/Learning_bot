<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Bot - AI Academic Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            height: 80vh;
            max-height: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px 15px 0 0;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-in-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 12px;
            word-wrap: break-word;
            line-height: 1.4;
        }

        .user .message-bubble {
            background: #667eea;
            color: white;
            border-bottom-right-radius: 4px;
        }

        .bot .message-bubble {
            background: #e9ecef;
            color: #333;
            border-bottom-left-radius: 4px;
            max-width: 92%;
            overflow-x: auto;
        }

        .bot .message-bubble h1,
        .bot .message-bubble h2,
        .bot .message-bubble h3,
        .bot .message-bubble h4 {
            margin: 10px 0 8px;
            line-height: 1.2;
            color: #222;
        }

        .bot .message-bubble h1 {
            font-size: 22px;
        }

        .bot .message-bubble h2 {
            font-size: 19px;
        }

        .bot .message-bubble h3,
        .bot .message-bubble h4 {
            font-size: 16px;
        }

        .bot .message-bubble p {
            margin: 8px 0;
        }

        .bot .message-bubble ul,
        .bot .message-bubble ol {
            margin: 8px 0 8px 22px;
        }

        .bot .message-bubble li {
            margin: 4px 0;
        }

        .bot .message-bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 10px 0;
            font-size: 14px;
            background: white;
        }

        .bot .message-bubble th,
        .bot .message-bubble td {
            border: 1px solid #cfd4da;
            padding: 8px 10px;
            text-align: left;
            vertical-align: top;
        }

        .bot .message-bubble th {
            background: #f1f3f5;
            font-weight: 700;
        }

        .bot .message-bubble hr {
            border: 0;
            border-top: 1px solid #ced4da;
            margin: 12px 0;
        }

        .timestamp {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .input-area {
            padding: 20px;
            border-top: 1px solid #ddd;
            background: white;
            border-radius: 0 0 15px 15px;
        }

        .user-id-input {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .user-id-input input {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }

        .user-id-input input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        .question-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .question-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .send-btn {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #667eea;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #667eea;
            border-radius: 50%;
            animation: spin 0.6s infinite;
        }

        @keyframes spin {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #f5c6cb;
        }

        .success {
            background: #d4edda;
            color: #155724;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 15px;
            border: 1px solid #c3e6cb;
        }

        .chat-area::-webkit-scrollbar {
            width: 8px;
        }

        .chat-area::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        .chat-area::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Study Bot</h1>
            <p>Your AI-powered academic assistant</p>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="success">
                Welcome to Study Bot! Enter your user ID and start asking study-related questions.
            </div>
        </div>

        <div class="input-area">
            <div class="user-id-input">
                <input 
                    type="text" 
                    id="userId" 
                    placeholder="Enter your User ID" 
                    value="user123"
                >
            </div>

            <form class="input-form" id="chatForm">
                <input 
                    type="text" 
                    id="questionInput" 
                    class="question-input"
                    placeholder="Ask a study question..." 
                    autocomplete="off"
                >
                <button type="submit" class="send-btn" id="sendBtn">Send</button>
            </form>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const chatForm = document.getElementById('chatForm');
        const questionInput = document.getElementById('questionInput');
        const userIdInput = document.getElementById('userId');
        const sendBtn = document.getElementById('sendBtn');

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatInline(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/`([^`]+)`/g, '<code>$1</code>');
        }

        function renderTable(lines, startIndex) {
            const tableLines = [];
            let index = startIndex;

            while (index < lines.length && /^\s*\|.*\|\s*$/.test(lines[index])) {
                tableLines.push(lines[index].trim());
                index++;
            }

            if (tableLines.length < 2 || !/^\|?\s*:?-{3,}:?\s*(\|\s*:?-{3,}:?\s*)+\|?$/.test(tableLines[1])) {
                return null;
            }

            const rows = tableLines
                .filter((_, rowIndex) => rowIndex !== 1)
                .map(line => line.replace(/^\||\|$/g, '').split('|').map(cell => formatInline(cell.trim())));

            const header = rows.shift();
            const headerHtml = `<thead><tr>${header.map(cell => `<th>${cell}</th>`).join('')}</tr></thead>`;
            const bodyHtml = `<tbody>${rows.map(row => `<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>`;

            return {
                html: `<table>${headerHtml}${bodyHtml}</table>`,
                nextIndex: index
            };
        }

        function renderMarkdown(text) {
            const lines = escapeHtml(text).split(/\r?\n/);
            const html = [];
            let listType = null;

            function closeList() {
                if (listType) {
                    html.push(`</${listType}>`);
                    listType = null;
                }
            }

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();

                if (!line) {
                    closeList();
                    continue;
                }

                const table = renderTable(lines, i);
                if (table) {
                    closeList();
                    html.push(table.html);
                    i = table.nextIndex - 1;
                    continue;
                }

                if (/^---+$/.test(line)) {
                    closeList();
                    html.push('<hr>');
                    continue;
                }

                const heading = line.match(/^(#{1,4})\s+(.+)$/);
                if (heading) {
                    closeList();
                    const level = heading[1].length;
                    html.push(`<h${level}>${formatInline(heading[2])}</h${level}>`);
                    continue;
                }

                const ordered = line.match(/^\d+\.\s+(.+)$/);
                if (ordered) {
                    if (listType !== 'ol') {
                        closeList();
                        listType = 'ol';
                        html.push('<ol>');
                    }
                    html.push(`<li>${formatInline(ordered[1])}</li>`);
                    continue;
                }

                const unordered = line.match(/^[-*]\s+(.+)$/);
                if (unordered) {
                    if (listType !== 'ul') {
                        closeList();
                        listType = 'ul';
                        html.push('<ul>');
                    }
                    html.push(`<li>${formatInline(unordered[1])}</li>`);
                    continue;
                }

                closeList();
                html.push(`<p>${formatInline(line)}</p>`);
            }

            closeList();
            return html.join('');
        }

        // Add message to chat
        function addMessage(text, isUser) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'bot'}`;
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            if (isUser) {
                bubble.textContent = text;
            } else {
                bubble.innerHTML = renderMarkdown(text);
            }
            
            messageDiv.appendChild(bubble);
            
            const timestamp = document.createElement('div');
            timestamp.className = 'timestamp';
            timestamp.textContent = new Date().toLocaleTimeString();
            messageDiv.appendChild(timestamp);
            
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Show loading indicator
        function showLoading() {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message bot';
            messageDiv.id = 'loadingMessage';
            
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.innerHTML = '<div class="loading"><span class="spinner"></span> Study Bot is thinking...</div>';
            
            messageDiv.appendChild(bubble);
            chatArea.appendChild(messageDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        // Remove loading indicator
        function removeLoading() {
            const loading = document.getElementById('loadingMessage');
            if (loading) {
                loading.remove();
            }
        }

        // Send message
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const userId = userIdInput.value.trim();
            const question = questionInput.value.trim();

            if (!userId) {
                addMessage('Please enter a User ID', 'bot');
                return;
            }

            if (!question) {
                return;
            }

            // Add user message
            addMessage(question, true);
            questionInput.value = '';
            sendBtn.disabled = true;

            showLoading();

            try {
                const response = await fetch('http://127.0.0.1:8000/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        user_id: userId,
                        question: question
                    })
                });

                removeLoading();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                addMessage(data.response, false);
            } catch (error) {
                removeLoading();
                addMessage(`Error: ${error.message}. Make sure the server is running at http://127.0.0.1:8000`, 'bot');
                console.error('Error:', error);
            } finally {
                sendBtn.disabled = false;
                questionInput.focus();
            }
        });

        // Focus on input when page loads
        questionInput.focus();
    </script>
</body>
</html>
